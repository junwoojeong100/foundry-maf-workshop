name: maf-tools-agent
description: >
  MAF로 만든 도구(함수) 에이전트. Foundry에 hosted agent로 배포됩니다.
metadata:
  tags:
    - Agent Framework
    - AI Agent Hosting
    - Responses Protocol
    - Function Tools
template:
  name: maf-tools-agent
  kind: hosted
  protocols:
    - protocol: responses
      version: 2.0.0
  environment_variables:
    - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
      value: "{{AZURE_AI_MODEL_DEPLOYMENT_NAME}}"
resources:
  - kind: model
    id: gpt-5.4
    name: AZURE_AI_MODEL_DEPLOYMENT_NAME
