name: maf-workflow-agent
description: >
  MAF 워크플로우(writer → legal_reviewer → formatter)를 하나의 에이전트로 노출해
  Foundry에 hosted agent로 배포합니다.
metadata:
  tags:
    - Agent Framework
    - AI Agent Hosting
    - Responses Protocol
    - Workflow
template:
  name: maf-workflow-agent
  kind: hosted
  protocols:
    - protocol: responses
      version: 2.0.0
  environment_variables:
    - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
      value: "{{AZURE_AI_MODEL_DEPLOYMENT_NAME}}"
resources:
  - kind: model
    id: gpt-5.4
    name: AZURE_AI_MODEL_DEPLOYMENT_NAME
